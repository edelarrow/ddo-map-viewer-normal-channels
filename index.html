<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rising Maps Normal Channels</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood: #8b1a1a;
            --ember: #c9622f;
            --gold: #c9a84c;
            --ash: #b0a090;
            --void: #080608;
            --parchment: #e8dcc8;
            --panel-bg: #100c10;
            --panel-border: rgba(201,168,76,0.18);
            --panel-hover: rgba(201,168,76,0.07);
            --accent: #c9a84c;
            --accent-dim: rgba(201,168,76,0.25);
            --text-main: #e8dcc8;
            --text-muted: #b0a090;
            --text-dim: #6a5a4a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'Crimson Text', Georgia, serif;
            background: var(--void);
            color: var(--text-main);
        }

        #app {
            display: flex;
            height: 100vh;
        }

        /* ── Sidebar ── */
        #sidebar {
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            border-right: 1px solid var(--panel-border);
            overflow: hidden;
            position: relative;
        }

        #sidebar h1 {
            padding: 12px 16px;
            font-size: 0.9rem;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
            border-bottom: 1px solid var(--panel-border);
            text-shadow: 0 0 18px rgba(201,168,76,0.35);
        }

        #search-box {
            padding: 8px;
            border-bottom: 1px solid var(--panel-border);
            position: relative;
        }
        #search-box input {
            width: 100%;
            padding: 6px 28px 6px 8px;
            background: rgba(201,168,76,0.06);
            border: 1px solid var(--panel-border);
            border-radius: 3px;
            color: var(--text-main);
            font-size: 0.85rem;
            font-family: 'Crimson Text', serif;
            box-sizing: border-box;
        }
        #search-box input:focus { outline: none; border-color: var(--gold); }
        #search-box input::placeholder { color: var(--text-dim); }
        #map-search-clear {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-dim); cursor: pointer;
            font-size: 0.8rem; line-height: 1; padding: 2px 4px;
            display: none;
        }
        #map-search-clear:hover { color: var(--ash); }

        #map-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .map-group-header {
            padding: 6px 16px 2px;
            font-size: 0.65rem;
            font-family: 'Cinzel', serif;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ember);
        }

        .map-entry {
            padding: 5px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            border-left: 3px solid transparent;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .map-entry:hover { background: var(--panel-hover); }

        .map-entry.active {
            background: var(--panel-hover);
            border-left-color: var(--gold);
            color: var(--parchment);
        }

        .map-entry .img-dot,
        .map-subentry .img-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .map-entry .img-dot.has-img,
        .map-subentry .img-dot.has-img { background: #4caf50; }
        .map-entry .img-dot.no-img,
        .map-subentry .img-dot.no-img  { background: var(--text-dim); }

        .map-entry .expand-arrow {
            font-size: 0.6rem;
            color: var(--text-dim);
            flex-shrink: 0;
            transition: transform 0.15s;
            width: 10px;
            text-align: center;
        }
        .map-entry.expanded .expand-arrow { transform: rotate(90deg); }

        .map-sublist { display: none; }
        .map-sublist.open { display: block; }

        .map-subentry {
            padding: 4px 16px 4px 30px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--ash);
            border-left: 3px solid transparent;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .map-subentry:hover { background: var(--panel-hover); color: var(--parchment); }
        .map-subentry.active {
            background: var(--panel-hover);
            border-left-color: var(--gold);
            color: var(--parchment);
        }

        /* ── Layers panel ── */
        #layers-panel {
            padding: 10px 16px;
            border-top: 1px solid var(--panel-border);
            font-size: 0.82rem;
        }

        #layers-panel h3 {
            font-size: 0.65rem;
            font-family: 'Cinzel', serif;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ember);
            margin-bottom: 6px;
        }

        #layers-panel .layer-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 8px;
        }

        .layer-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 2px 0;
            cursor: pointer;
            color: var(--ash);
        }

        .layer-toggle input { cursor: pointer; accent-color: var(--gold); }

        /* ── Map container ── */
        #map-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
            background: #050305;
        }

        #map-title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(8,6,8,0.88);
            padding: 4px 18px;
            border-radius: 2px;
            font-size: 0.8rem;
            font-family: 'Cinzel', serif;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--parchment);
            pointer-events: none;
            border: 1px solid var(--panel-border);
            text-shadow: 0 0 12px rgba(201,168,76,0.2);
        }

        #floor-selector {
            position: absolute;
            top: 42px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 4px;
        }
        #floor-selector button {
            background: rgba(8,6,8,0.85);
            color: var(--ash);
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            padding: 2px 10px;
            font-size: 0.72rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.05em;
            cursor: pointer;
        }
        #floor-selector button.active {
            background: rgba(201,168,76,0.12);
            color: var(--gold);
            border-color: var(--gold);
        }

        #tile-layer-selector {
            position: absolute;
            top: 72px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 4px;
        }
        #tile-layer-selector button {
            background: rgba(8,6,8,0.85);
            color: var(--ash);
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            padding: 2px 10px;
            font-size: 0.72rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.05em;
            cursor: pointer;
        }
        #tile-layer-selector button.active {
            background: rgba(201,168,76,0.12);
            color: var(--gold);
            border-color: var(--gold);
        }

        #coord-display {
            position: absolute;
            bottom: 8px;
            left: 8px;
            z-index: 1000;
            background: rgba(8,6,8,0.85);
            padding: 4px 10px;
            border-radius: 2px;
            font-size: 0.9rem;
            font-family: monospace;
            font-weight: 600;
            color: var(--ash);
            pointer-events: none;
            min-width: 280px;
            text-align: left;
            border: 1px solid var(--panel-border);
        }
        /* ── Stage groups panel ── */
        #stage-groups-panel {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: rgba(8,6,8,0.93);
            border: 1px solid var(--panel-border);
            border-radius: 3px;
            font-size: 0.74rem;
            color: var(--ash);
            min-width: 380px;
            max-width: 520px;
            display: none;
        }
        #stage-groups-panel .sgp-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 10px;
            cursor: pointer;
            border-bottom: 1px solid var(--panel-border);
            user-select: none;
        }
        #stage-groups-panel .sgp-header:hover { background: var(--panel-hover); }
        #stage-groups-panel .sgp-title { font-family: 'Cinzel', serif; font-weight: 600; color: var(--parchment); font-size: 0.72rem; letter-spacing: 0.08em; }
        #stage-groups-panel .sgp-toggle { color: var(--text-dim); font-size: 0.7rem; }
        #stage-groups-panel .sgp-body {
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 4px 0;
            transition: max-height 0.35s ease, padding 0.35s ease, opacity 0.3s ease;
            opacity: 1;
        }

        #stage-groups-panel .sgp-row {
            display: grid;
            grid-template-columns: 46px 1fr 80px 80px;
            gap: 2px 6px;
            padding: 3px 10px;
            border-bottom: 1px solid rgba(201,168,76,0.07);
            align-items: start;
        }
        #stage-groups-panel .sgp-row:last-child { border-bottom: none; }
        #stage-groups-panel .sgp-group { color: var(--text-dim); font-variant-numeric: tabular-nums; }
        #stage-groups-panel .sgp-name  { color: var(--ash); font-style: italic; }
        #stage-groups-panel .sgp-quest { color: var(--ember); font-variant-numeric: tabular-nums; }
        #stage-groups-panel .sgp-flag  { color: #7a8aba; font-variant-numeric: tabular-nums; }
        #stage-groups-panel .sgp-npc-list {
            grid-column: 1 / -1;
            padding: 1px 10px 3px 46px;
            display: flex; flex-wrap: wrap; gap: 4px;
        }
        #stage-groups-panel .sgp-npc {
            background: rgba(201,168,76,0.08); border-radius: 2px;
            padding: 1px 6px; font-size: 0.68rem; color: var(--ash);
            white-space: nowrap;
        }
        #stage-groups-panel .sgp-npc-id { color: var(--text-dim); font-size: 0.65rem; }
        #stage-groups-panel .sgp-col-head {
            color: var(--text-dim); font-size: 0.68rem; padding: 2px 10px 3px; display: grid;
            grid-template-columns: 46px 1fr 80px 80px; gap: 2px 6px;
            overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s ease;
            max-height: 30px; opacity: 1;
            border-bottom: 1px solid var(--panel-border);
        }

        /* ── World flags section (inside stage-groups-panel) ── */
        #stage-groups-panel .wf-header { border-top: 1px solid var(--panel-border); }
        #stage-groups-panel .wf-col-head {
            color: var(--text-dim); font-size: 0.68rem; padding: 2px 10px 3px; display: grid;
            grid-template-columns: 42px 52px 52px 90px 72px 1fr; gap: 2px 6px;
            border-bottom: 1px solid var(--panel-border);
            overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s ease;
            max-height: 30px; opacity: 1;
        }
        #stage-groups-panel .wf-body {
            max-height: calc(100vh - 220px);
            overflow-y: auto; overflow-x: hidden;
            padding: 4px 0;
            transition: max-height 0.35s ease, padding 0.35s ease, opacity 0.3s ease;
            opacity: 1;
        }
        #stage-groups-panel .wf-row {
            display: grid;
            grid-template-columns: 42px 52px 52px 90px 72px 1fr;
            gap: 2px 6px;
            padding: 3px 10px;
            border-bottom: 1px solid rgba(201,168,76,0.07);
            align-items: start;
            font-size: 0.72rem;
        }
        #stage-groups-panel .wf-row.wf-deprecated { opacity: 0.45; }
        #stage-groups-panel .wf-season-chip {
            display: inline-block; border-radius: 2px;
            padding: 1px 4px; font-size: 0.65rem; font-weight: 700;
            color: #fff; letter-spacing: 0.03em; white-space: nowrap;
        }
        #stage-groups-panel .wf-flag    { color: var(--gold); font-variant-numeric: tabular-nums; }
        #stage-groups-panel .wf-erase   { color: #7a8aba; font-variant-numeric: tabular-nums; }
        #stage-groups-panel .wf-name    { color: var(--ash); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: default; }
        #stage-groups-panel .wf-questno { color: var(--ember); font-variant-numeric: tabular-nums; font-size: 0.68rem; }
        #stage-groups-panel .wf-comment { color: var(--ash); font-style: italic;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #stage-groups-panel .wf-permanent { font-size: 0.7rem; margin-left: 2px; }
        #stage-groups-panel .wf-hidden {
            max-height: 0 !important; padding: 0 !important;
            opacity: 0 !important; overflow: hidden;
            transition: max-height 0.35s ease, padding 0.35s ease, opacity 0.3s ease;
        }

        /* ── Pd piece boundary labels ── */
        .pd-label {
            color: #ffcc44;
            font-size: 10px;
            font-family: monospace;
            font-weight: 600;
            white-space: nowrap;
            pointer-events: none;
        }
        .pd-label-btn {
            pointer-events: auto;
            cursor: zoom-in;
            text-decoration: underline dotted;
        }
        .pd-label-btn:hover { color: #ffe88a; }

        /* ── Stage / area name labels ── */
        .stage-label {
            color: rgba(201, 168, 76, 0.85);
            font-size: 20px;
            font-family: 'Cinzel', serif;
            font-weight: 900;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(0,0,0,1), 0 0 4px rgba(0,0,0,1), 1px 1px 2px rgba(0,0,0,1);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* ── Grid labels ── */
        .grid-label {
            color: rgba(255, 255, 255, 0.55);
            font-size: 10px;
            font-family: monospace;
            font-weight: 600;
            text-align: center;
            pointer-events: none;
            white-space: nowrap;
            text-shadow: 0 0 3px rgba(0,0,0,0.9);
        }

        /* ── Icons ── */
        .ddon-icon {
            height: 32px;
            width: 32px;
            background-image: url("resources/MapIcons.webp");
            background-size: 256px;
        }
        .ddon-icon-door    { background-position: -191px 0; }
        .ddon-icon-dungeon { background-position: -111px -29px; }

        /* ── Enemy marker drop-shadow for contrast against any map background ── */
        .enemy-marker {
            filter: drop-shadow(0 0 2px #000) drop-shadow(0 0 1px #000);
        }
        /* Key-bearer spawns get an extra glow to stand out */
        .key-bearer-spawn {
            filter: drop-shadow(0 0 3px #c8a000) drop-shadow(0 0 2px #000);
        }

        /* ── Group chip labels ── */
        .group-chip {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 7px 2px 5px;
            border: 1.5px solid currentColor;
            border-radius: 2px;
            background: rgba(8, 6, 8, 0.88);
            font-family: 'Cinzel', serif;
            font-size: 10px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            text-shadow: 0 0 4px rgba(0,0,0,0.9);
            box-shadow: 0 0 4px rgba(0,0,0,0.7);
            transition: background 0.1s;
        }
        .group-chip:hover { background: rgba(201,168,76,0.1); }
        .chip-count {
            font-size: 9px;
            opacity: 0.75;
            font-weight: 500;
        }
        .chip-arrow {
            font-size: 8px;
            transition: transform 0.15s;
            display: inline-block;
            opacity: 0.8;
        }
        .chip-arrow.open { transform: rotate(90deg); }
        .group-chip.chip-open { opacity: 0.75; }

        /* ── Reset-view control ── */
        .leaflet-control-reset-view {
            font-size: 18px;
            line-height: 26px !important;
            font-weight: normal;
        }

        /* ── Sidebar collapse ── */
        #sidebar {
            transition: width 0.2s ease, min-width 0.2s ease;
        }
        #sidebar.collapsed {
            width: 0 !important;
            min-width: 0 !important;
            overflow: hidden;
        }
        #sidebar.resizing { transition: none; }
        #sidebar-resize-handle {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 5px;
            cursor: ew-resize;
            z-index: 10;
        }
        #sidebar-resize-handle:hover, #sidebar-resize-handle:active {
            background: rgba(201,168,76,0.2);
        }
        #sidebar-toggle {
            position: absolute;
            top: 130px;
            left: 10px;
            z-index: 1001;
            width: 30px;
            height: 30px;
            background: rgba(8,6,8,0.88);
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            color: var(--ash);
            font-size: 16px;
            line-height: 28px;
            text-align: center;
            cursor: pointer;
            display: none;
        }
        #sidebar-toggle:hover { background: var(--panel-hover); color: var(--gold); }

        /* ── Scrollbar ── */
        #map-list::-webkit-scrollbar { width: 6px; }
        #map-list::-webkit-scrollbar-track { background: transparent; }
        #map-list::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 3px; }

        /* ── Spot search panel ── */
        #spot-panel-toggle {
            position: absolute;
            right: 10px;
            top: 40px;
            z-index: 1100;
            background: rgba(8,6,8,0.88);
            border: 1px solid var(--panel-border);
            color: var(--ash);
            border-radius: 2px;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 0.9rem;
        }
        #spot-panel-toggle:hover { background: var(--panel-hover); color: var(--gold); }
        #spot-panel {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 265px;
            background: var(--panel-bg);
            border-left: 1px solid var(--panel-border);
            z-index: 1050;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.2s ease;
            overflow: hidden;
            color: var(--text-main);
        }
        #spot-panel.open { transform: translateX(0); }
        #spot-panel.resizing { transition: none; }
        #spot-resize-handle {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 5px;
            cursor: ew-resize;
            z-index: 10;
        }
        #spot-resize-handle:hover, #spot-resize-handle:active {
            background: rgba(201,168,76,0.2);
        }
        #spot-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 10px;
            background: rgba(201,168,76,0.04);
            border-bottom: 1px solid var(--panel-border);
            font-size: 0.68rem;
            font-family: 'Cinzel', serif;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
            flex-shrink: 0;
        }
        #spot-panel-close {
            background: none; border: none; color: var(--text-dim); cursor: pointer;
            font-size: 0.9rem; line-height: 1; padding: 2px 4px;
        }
        #spot-panel-close:hover { color: var(--ash); }
        #spot-search-wrap {
            position: relative;
            margin: 7px 8px 4px;
            flex-shrink: 0;
        }
        #spot-search-input {
            padding: 5px 24px 5px 8px;
            background: rgba(201,168,76,0.05);
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            color: var(--text-main);
            font-size: 0.82rem;
            font-family: 'Crimson Text', serif;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }
        #spot-search-input:focus { border-color: var(--gold); }
        #spot-search-clear {
            position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-dim); cursor: pointer;
            font-size: 0.8rem; line-height: 1; padding: 2px 4px;
            display: none;
        }
        #spot-search-clear:hover { color: var(--ash); }
        #spot-filter-tabs {
            display: flex; gap: 4px;
            padding: 0 8px 6px;
            flex-shrink: 0;
        }
        .spot-tab {
            flex: 1; padding: 3px 0;
            background: rgba(201,168,76,0.04);
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            color: var(--text-dim); font-size: 0.7rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.05em;
            cursor: pointer;
        }
        .spot-tab.active { background: rgba(201,168,76,0.12); color: var(--gold); border-color: var(--gold); }
        .spot-tab:hover:not(.active) { background: rgba(201,168,76,0.07); color: var(--ash); }
        #spot-scope-row {
            display: flex;
            border-bottom: 1px solid var(--panel-border);
            flex-shrink: 0;
        }
        .spot-scope {
            flex: 1; padding: 4px 0;
            background: none;
            border: none;
            color: var(--text-dim); font-size: 0.7rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.04em;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .spot-scope.active { color: var(--gold); border-bottom-color: var(--gold); }
        .spot-scope:hover:not(.active) { color: var(--ash); }
        #spot-results {
            flex: 1;
            overflow-y: auto;
            padding: 0 4px 4px;
        }
        #spot-results::-webkit-scrollbar { width: 5px; }
        #spot-results::-webkit-scrollbar-track { background: transparent; }
        #spot-results::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.2); border-radius: 3px; }
        .spot-empty {
            padding: 10px 8px;
            color: var(--text-dim); font-size: 0.78rem; text-align: center;
            font-style: italic;
        }
        .spot-summary {
            padding: 4px 8px 2px;
            color: var(--text-dim); font-size: 0.7rem;
            border-bottom: 1px solid var(--panel-border);
        }
        .spot-result-row {
            position: relative;
            display: flex; align-items: center; gap: 6px;
            padding: 5px 8px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 0.78rem;
            border-bottom: 1px solid rgba(201,168,76,0.06);
        }
        .spot-result-row:hover { background: var(--panel-hover); }
        .spot-result-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--parchment); }
        .spot-result-count { color: var(--text-dim); font-size: 0.7rem; flex-shrink: 0; }
        .spot-nav-btn {
            background: rgba(201,168,76,0.05); border: 1px solid var(--panel-border); color: var(--ash);
            border-radius: 2px; padding: 1px 5px; cursor: pointer; font-size: 0.68rem; line-height: 1.4;
        }
        .spot-nav-btn:hover { background: rgba(201,168,76,0.12); color: var(--gold); border-color: var(--gold); }
        /* Preview card — pops out to the left on hover */
        .spot-preview {
            display: none;
            position: absolute;
            right: calc(100% + 4px);
            top: 0;
            background: rgba(8,6,8,0.97);
            border: 1px solid var(--panel-border);
            border-radius: 2px;
            padding: 6px 10px;
            font-size: 0.74rem;
            line-height: 1.6;
            white-space: nowrap;
            z-index: 1200;
            pointer-events: none;
            box-shadow: -2px 2px 12px rgba(0,0,0,0.8);
            color: var(--ash);
        }
        .spot-result-row:hover .spot-preview { display: block; }
        .spot-preview b { color: var(--parchment); }
        .spot-stage-sub {
            font-size: 0.68rem;
            color: var(--text-dim);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 1px;
        }
        /* Highlight ring on map */
        /* Outer div is used by Leaflet for translate3d positioning — must stay untouched */
        .spot-hl-outer { background: none !important; border: none !important; }
        /* Inner div carries the animation so transform: scale() doesn't fight Leaflet's translate3d */
        .spot-hl {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 3px solid #ffe600;
            box-shadow: 0 0 0 3px rgba(255,230,0,0.25), 0 0 12px 5px rgba(255,200,0,0.55);
            animation: spot-pulse 0.85s ease-in-out infinite;
            pointer-events: none;
        }
        /* Applied directly to the .group-chip element when a spot search row is hovered */
        .group-chip.spot-hl-chip {
            animation: spot-pulse-chip 0.85s ease-in-out infinite;
        }
        @keyframes spot-pulse-chip {
            0%, 100% { box-shadow: 0 0 4px rgba(0,0,0,0.7), 0 0 0 2px rgba(255,230,0,0.5), 0 0 12px 5px rgba(255,200,0,0.7); }
            50%       { box-shadow: 0 0 4px rgba(0,0,0,0.7), 0 0 0 4px rgba(255,230,0,0.15), 0 0 18px 8px rgba(255,200,0,0.25); }
        }
        @keyframes spot-pulse {
            0%, 100% { transform: scale(1);   opacity: 1; }
            50%       { transform: scale(1.6); opacity: 0.35; }
        }
    </style>
</head>
<body>
<div id="app">
    <div id="sidebar">
        <div id="sidebar-resize-handle"></div>
        <h1>DDON Maps <button id="sidebar-collapse" title="Collapse sidebar" style="float:right;background:none;border:none;color:var(--text-dim);font-size:1rem;cursor:pointer;padding:0 4px;line-height:1">◀</button></h1>
        <div id="search-box">
            <input type="text" id="map-search" placeholder="Search maps..." autocomplete="off" spellcheck="false" title="Search by name&#10;stageno=200  — match stage number&#10;stageid=2    — match internal stage ID&#10;area=cassardis — match quest area name">
            <button id="map-search-clear" title="Clear search">✕</button>
        </div>
        <div id="map-list"></div>
        <div id="layers-panel">
            <h3>Layers</h3>
            <label class="layer-toggle">
                <input type="checkbox" id="layer-enemies" checked>
                Enemy Spawns
            </label>
            <div id="subgroup-bar" style="display:none;flex-wrap:wrap;gap:3px;margin:2px 0 4px 20px;align-items:center"></div>
            <div class="layer-list">
                <label class="layer-toggle">
                    <input type="checkbox" id="layer-gather">
                    Gathering Nodes
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" id="layer-shops">
                    Shops &amp; Appraisals
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" id="layer-break-targets">
                    Destroyable Objects
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" id="layer-connections" checked>
                    Connections
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" id="layer-landmarks" checked>
                    Landmarks
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" id="layer-stage-labels" checked>
                    Area Names
                </label>
                <label class="layer-toggle">
                    <input type="checkbox" id="layer-radii">
                    Aggro/Link Radius
                </label>

                <label class="layer-toggle">
                    <input type="checkbox" id="layer-grid">
                    Grid
                </label>
            </div>
            <div id="exits-panel" style="display:none;margin-top:6px;padding-top:6px;border-top:1px solid rgba(201,168,76,0.18);">
                <div style="font-size:0.65rem;font-family:'Cinzel',serif;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ember);margin-bottom:4px;">Exits</div>
                <div id="exits-list"></div>
            </div>
            <button id="btn-expand-collapse" style="
                margin-top:8px;width:100%;padding:4px 0;
                background:rgba(201,168,76,0.06);color:var(--ash);border:1px solid rgba(201,168,76,0.18);
                border-radius:2px;font-size:0.72rem;font-family:'Cinzel',serif;letter-spacing:0.06em;cursor:pointer;
            ">Expand All</button>
            <div style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(201,168,76,0.18);font-size:0.75rem;color:var(--text-dim);line-height:1.7">
                Click chip to expand group<br>
                Middle-click hull to collapse<br>
                Click spawn to show:<br>
                <span style="color:#ffd700">&#9679;</span> Aggro radius<br>
                <span style="color:#ff7700">&#9675;</span> Link radius
            </div>
        </div>
    </div>

    <div id="map-container">
        <button id="sidebar-toggle" title="Open sidebar">☰</button>
        <div id="map-title">—</div>
        <div id="floor-selector"></div>
        <div id="tile-layer-selector"></div>
        <div id="map"></div>
        <div id="coord-display"></div>
        <div id="stage-groups-panel"></div>
        <button id="spot-panel-toggle" title="Spot search (Ctrl+F)">🔍</button>
        <div id="spot-panel">
            <div id="spot-resize-handle"></div>
            <div id="spot-panel-header">
                <span>Spot Search</span>
                <button id="spot-panel-close" title="Close (Esc)">✕</button>
            </div>
            <div id="spot-search-wrap">
                <input type="text" id="spot-search-input" placeholder="Enemy, item or gathering type…" autocomplete="off" spellcheck="false" title='Use "quotes" for an exact match — e.g. "Healing Potion"'>
                <button id="spot-search-clear" title="Clear search">✕</button>
            </div>
            <div id="spot-filter-tabs">
                <button class="spot-tab active" data-filter="enemy">Enemies</button>
                <button class="spot-tab" data-filter="gather">Gathering</button>
                <button class="spot-tab" data-filter="item">Items</button>
            </div>
            <div id="spot-scope-row">
                <button class="spot-scope active" data-scope="local">This Stage</button>
                <button class="spot-scope" data-scope="global">All Stages</button>
            </div>
            <div id="spot-results"><div class="spot-empty">Type to search enemies or gathering points on this map.</div></div>
        </div>
    </div>
</div>
<script type="module" src="map.js"></script>

</div>

</body>
</html>
